experiment:
  name: qwen25vl3b_full1200_over
  stage: formal_full1200
  method: over_disclosure_steering
  publish: true
  description: "Formal full1200 experiment for reducing over-disclosure."

model:
  name: Qwen/Qwen2.5-VL-3B-Instruct
  short_name: qwen25vl3b

data:
  image_dir: data/02_full1200/images
  metadata_dir: data/02_full1200/metadata
  train_csv: data/02_full1200/metadata/geoprivacy_available_train.csv
  val_csv: data/02_full1200/metadata/geoprivacy_available_val.csv
  test_csv: data/02_full1200/metadata/geoprivacy_available_test.csv

outputs:
  root_dir: outputs/02_formal_full1200/02_over
  vector_cases_dir: outputs/02_formal_full1200/02_over/vector_cases
  vectors_dir: outputs/02_formal_full1200/02_over/vectors
  scores_dir: outputs/02_formal_full1200/02_over/scores
  steering_dir: outputs/02_formal_full1200/02_over/steering
  sweeps_dir: outputs/02_formal_full1200/02_over/sweeps

condition_vector:
  positive_true_labels: ["A", "B"]
  negative_true_labels: ["C"]

behavior_vector:
  positive_transitions: ["A_to_A", "B_to_B"]
  negative_transitions: ["A_to_B", "A_to_C", "B_to_C"]

steering:
  layer: 32
  alpha: 0.5
  threshold: -0.03
  gate_direction: larger

metrics:
  main:
    - accuracy
    - over_disclosure_rate
    - under_disclosure_rate
